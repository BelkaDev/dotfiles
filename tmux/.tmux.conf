# ── Core ──────────────────────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 10000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g window-status-style 'fg=#6c7086'
set -g window-status-current-style 'fg=#89b4fa bold'
set -g status-left '#[bold][#S] '
set -g status-right '#[fg=#a6e3a1]%H:%M'
set -g status-left-length 20

# ── Splits ────────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Pane navigation (prefix + arrow) ─────────────────────────────────────────
bind Up    select-pane -U
bind Down  select-pane -D
bind Left  select-pane -L
bind Right select-pane -R

bind -r C-Up    resize-pane -U 5
bind -r C-Down  resize-pane -D 5
bind -r C-Left  resize-pane -L 5
bind -r C-Right resize-pane -R 5

# ── Layout preset: windows (tabs) ────────────────────────────────────────────
# Default — un terminal plein écran par fenêtre, naviguer avec mouse ou Ctrl+B 0-9

# ── Layout preset: panes (split) ─────────────────────────────────────────────
# Pour activer: décommente ces lignes et relance tmux
# bind M-1 split-window -h -c "#{pane_current_path}"
# bind M-2 split-window -v -c "#{pane_current_path}"

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'
